<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pinch — Leaderboard</title>
<link rel="stylesheet" href="./style.css" />
<script>window.PINCH_FIREBASE_CONFIG = {};</script>

<style>
  .tabs {
    display: flex;
    gap: 8px;
    margin: 28px 0 24px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
  .tab.active {
    background: var(--accent, #c690ff);
    color: #05060f;
    border-color: var(--accent, #c690ff);
    box-shadow: 0 0 24px rgba(198,144,255,0.35);
  }

  .lb-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .lb-title { font-size: 1.5rem; font-weight: 400; }
  .lb-subtitle { font-size: 0.85rem; opacity: 0.6; letter-spacing: 0.04em; }

  .lb-table {
    border-radius: 14px;
    overflow: hidden;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 60px 1fr 140px 110px;
    gap: 16px;
    padding: 16px 24px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .lb-row.header {
    font-size: 0.65rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    opacity: 0.5;
    background: rgba(255,255,255,0.02);
    font-weight: 700;
  }
  .lb-row.you {
    background: rgba(198, 144, 255, 0.12);
    border-left: 3px solid #c690ff;
    padding-left: 21px;
  }
  .lb-row .rank {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.5);
  }
  .lb-row.gold .rank   { color: #ffd089; }
  .lb-row.silver .rank { color: #d8d8d8; }
  .lb-row.bronze .rank { color: #c89570; }
  .lb-row .name { font-size: 1.1rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-row .name .you-tag {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #c690ff;
    color: #05060f;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 10px;
    font-weight: 700;
    vertical-align: middle;
  }
  .lb-row .when {
    font-size: 0.75rem;
    opacity: 0.5;
    letter-spacing: 0.04em;
  }
  .lb-row .score {
    font-size: 1.3rem;
    font-weight: 700;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--accent, #c690ff);
  }

  .empty-state {
    text-align: center;
    padding: 80px 30px;
    opacity: 0.5;
  }
  .empty-state h3 { font-weight: 300; font-size: 1.6rem; margin-bottom: 8px; }
  .empty-state p { letter-spacing: 0.1em; font-size: 0.85rem; }

  .loading {
    text-align: center;
    padding: 60px;
    opacity: 0.5;
    font-size: 0.85rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="nav-slot"></div>

<main class="page">
  <div class="page-inner mount">
    <div class="eyebrow">Hall of fastest hands</div>
    <h1 class="display">Leader<em>board.</em></h1>

    <div class="tabs" id="tabs"></div>

    <div class="lb-header">
      <div>
        <div class="lb-title" id="mode-name">—</div>
        <div class="lb-subtitle" id="mode-desc">—</div>
      </div>
      <span class="mode-badge" id="backend-badge">…</span>
    </div>

    <div class="lb-table panel" id="lb-content" style="padding:0">
      <div class="loading">Loading…</div>
    </div>

    <div style="margin-top:30px; display:flex; gap:12px;">
      <a href="./modes.html" class="btn btn-primary">▶ Play</a>
      <a href="./index.html" class="btn btn-ghost">Home</a>
    </div>
  </div>
</main>

<script type="module">
  import {
    MODES, MODE_ORDER, getBackend, renderNav, fmtScore, escapeHtml
  } from "./core.js";

  document.getElementById("nav-slot").innerHTML = renderNav("lb");

  // Read mode from query string; default to classic
  const urlMode = new URLSearchParams(location.search).get("mode");
  let activeMode = MODE_ORDER.includes(urlMode) ? urlMode : "classic";

  // Render tabs
  const tabsEl = document.getElementById("tabs");
  function renderTabs() {
    tabsEl.innerHTML = MODE_ORDER.map((id) => {
      const m = MODES[id];
      const active = id === activeMode;
      return `<button class="tab ${active ? "active" : ""}" style="--accent:${m.accent}" data-mode="${id}">${m.name}</button>`;
    }).join("");
    tabsEl.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        activeMode = btn.dataset.mode;
        history.replaceState(null, "", `?mode=${activeMode}`);
        renderTabs();
        renderHeader();
        renderRows();
      });
    });
  }
  function renderHeader() {
    const m = MODES[activeMode];
    document.getElementById("mode-name").textContent = m.name;
    document.getElementById("mode-desc").textContent = m.description;
    document.documentElement.style.setProperty("--accent", m.accent);
  }

  function relativeTime(ts) {
    if (!ts) return "—";
    const diff = Date.now() - ts;
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return `${sec}s ago`;
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}m ago`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}h ago`;
    const d = Math.floor(hr / 24);
    return `${d}d ago`;
  }

  let backend = null;
  async function renderRows() {
    const m = MODES[activeMode];
    const content = document.getElementById("lb-content");
    content.innerHTML = `<div class="loading">Loading ${m.name}…</div>`;
    if (!backend) backend = await getBackend();

    const badge = document.getElementById("backend-badge");
    badge.textContent = backend.mode === "public" ? "Public" : "Local";
    badge.classList.toggle("public", backend.mode === "public");
    badge.classList.toggle("local",  backend.mode === "local");

    let rows = [];
    try {
      rows = await backend.getLeaderboard(activeMode);
    } catch (e) {
      console.warn("[pinch] leaderboard fetch failed", e);
    }

    if (!rows || rows.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <h3>No scores yet.</h3>
          <p>Be the first to set a record in ${m.name}.</p>
        </div>
      `;
      return;
    }

    const headerRow = `
      <div class="lb-row header">
        <span>Rank</span>
        <span>Player</span>
        <span>When</span>
        <span style="text-align:right">${m.scoreLabel}</span>
      </div>
    `;
    const html = rows.slice(0, 10).map((r, i) => {
      const isMe = r.uid === backend.uid;
      const cls = ["lb-row"];
      if (isMe) cls.push("you");
      if (i === 0) cls.push("gold");
      else if (i === 1) cls.push("silver");
      else if (i === 2) cls.push("bronze");
      const scoreText = m.metric === "time"
        ? fmtScore(activeMode, r)
        : `${r.score}`;
      return `
        <div class="${cls.join(" ")}">
          <span class="rank">#${i + 1}</span>
          <span class="name">${escapeHtml(r.name)}${isMe ? `<span class="you-tag">You</span>` : ""}</span>
          <span class="when">${relativeTime(r.ts)}</span>
          <span class="score" style="color:${m.accent}">${scoreText}</span>
        </div>
      `;
    }).join("");
    content.innerHTML = headerRow + html;
  }

  renderTabs();
  renderHeader();
  renderRows();
</script>
</body>
</html>
